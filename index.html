<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Document Query Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #EFEBE2;
    --paper-raised: #FAF8F3;
    --ink: #1B1B18;
    --ink-muted: #6E6859;
    --rule: #D9D2C2;
    --indigo: #344663;
    --indigo-soft: rgba(52, 70, 99, 0.1);
    --ochre: #BD8A2E;
    --ochre-soft: rgba(189, 138, 46, 0.14);
    --radius: 8px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: "IBM Plex Sans", sans-serif;
    display: flex;
    justify-content: center;
    padding: 48px 16px 64px;
  }

  .app {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    position: relative;
  }

  /* ---------- Folder tab ---------- */
  .tab {
    position: absolute;
    top: -16px;
    left: 22px;
    background: var(--indigo);
    color: var(--paper-raised);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 5px 14px 6px;
    clip-path: polygon(8% 0, 92% 0, 100% 100%, 0% 100%);
    z-index: 1;
  }

  /* ---------- Masthead ---------- */
  .masthead {
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    border-bottom: 3px solid var(--indigo);
    border-radius: var(--radius);
    padding: 26px 24px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
  }

  .masthead-text .eyebrow {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ochre);
    margin: 0 0 6px;
  }

  .masthead-text h1 {
    font-family: "Newsreader", serif;
    font-weight: 600;
    font-size: 32px;
    line-height: 1.1;
    margin: 0;
    letter-spacing: 0.01em;
  }

  .masthead-text .sub {
    margin: 6px 0 0;
    font-size: 13.5px;
    color: var(--ink-muted);
    max-width: 360px;
  }

  .counter {
    text-align: right;
    flex-shrink: 0;
    font-family: "IBM Plex Mono", monospace;
  }

  .counter-label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .counter-value {
    display: block;
    font-size: 26px;
    font-weight: 500;
    color: var(--indigo);
    line-height: 1.1;
  }

  /* ---------- Chat card ---------- */
  .chat-card {
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 22px;
    min-height: 280px;
    max-height: 52vh;
    overflow-y: auto;
  }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--ink-muted);
    font-size: 14px;
    max-width: 340px;
    line-height: 1.65;
  }

  .empty-state strong {
    display: block;
    font-family: "Newsreader", serif;
    font-style: italic;
    font-size: 19px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }

  /* ---------- Message "catalog card" ---------- */
  .message {
    max-width: 84%;
    border-radius: 6px;
    font-size: 14.5px;
    line-height: 1.55;
    position: relative;
  }

  .message.user {
    align-self: flex-end;
    background: var(--indigo-soft);
    border: 1px solid rgba(52, 70, 99, 0.22);
    padding: 10px 14px;
  }

  .message.assistant {
    align-self: flex-start;
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 14px 14px 12px;
  }

  .message.assistant::before {
    content: "";
    position: absolute;
    top: -1px;
    left: 12px;
    right: 12px;
    height: 3px;
    background-image: radial-gradient(circle, var(--paper-raised) 1.6px, transparent 1.7px);
    background-size: 9px 3px;
    background-repeat: repeat-x;
  }

  .message-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 5px;
    gap: 10px;
  }

  .turn-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--indigo);
  }

  .message.user .turn-label { color: var(--ink-muted); }

  .role {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .message-body {
    white-space: pre-wrap;
  }

  /* ---------- Retrieved evidence chips (signature element) ---------- */
  .sources {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
    padding-top: 9px;
    border-top: 1px dashed var(--rule);
  }

  .sources-label {
    font-family: "IBM Plex Mono", monospace;
    font-size: 9.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    width: 100%;
    margin-bottom: 2px;
  }

  .chip {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--ink);
    background: var(--ochre-soft);
    border: 1px solid rgba(189, 138, 46, 0.35);
    border-bottom: 2px solid var(--ochre);
    border-radius: 4px;
    padding: 3px 8px;
  }

  /* ---------- Composer ---------- */
  .composer {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px;
    border-top: 1px solid var(--rule);
    background: var(--paper);
  }

  .composer input {
    flex: 1;
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 11px 14px;
    color: var(--ink);
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 14px;
    outline: none;
  }

  .composer input:focus {
    border-color: var(--indigo);
    box-shadow: 0 0 0 3px var(--indigo-soft);
  }

  .icon-btn, .primary-btn {
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 500;
    transition: transform 0.05s ease, background 0.15s ease;
  }

  .icon-btn {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-btn:hover { border-color: var(--indigo); }
  .icon-btn:focus-visible, .primary-btn:focus-visible, .reset-link:focus-visible {
    outline: 2px solid var(--indigo);
    outline-offset: 2px;
  }

  .icon-btn.recording {
    background: var(--ochre);
    border-color: var(--ochre);
    color: var(--paper-raised);
    animation: pulse 1.1s infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(189, 138, 46, 0.5); }
    70%  { box-shadow: 0 0 0 9px rgba(189, 138, 46, 0); }
    100% { box-shadow: 0 0 0 0 rgba(189, 138, 46, 0); }
  }

  .primary-btn {
    height: 42px;
    padding: 0 18px;
    background: var(--indigo);
    color: var(--paper-raised);
    font-size: 14px;
  }

  .primary-btn:hover { transform: translateY(-1px); }
  .primary-btn:disabled,
  .icon-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ---------- Footer row ---------- */
  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--ink-muted);
    padding: 0 4px;
  }

  .status {
    font-family: "IBM Plex Mono", monospace;
    min-height: 14px;
  }

  .reset-link {
    background: none;
    border: none;
    color: var(--ink-muted);
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }

  .reset-link:hover { color: var(--indigo); }

  @media (prefers-reduced-motion: reduce) {
    .icon-btn.recording { animation: none; }
  }

  @media (max-width: 480px) {
    .masthead { flex-direction: column; align-items: flex-start; }
    .counter { text-align: left; }
    .masthead-text h1 { font-size: 27px; }
    .message { max-width: 92%; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="tab">DOC·QE</div>

    <header class="masthead">
      <div class="masthead-text">
        <p class="eyebrow">Retrieval-Augmented Q&amp;A</p>
        <h1>Document Query Engine</h1>
        <p class="sub">Ask in text or by voice — answers grounded in the indexed documents.</p>
      </div>
      <div class="counter">
        <span class="counter-label">Queries</span>
        <span class="counter-value" id="counterValue">00</span>
      </div>
    </header>

    <main class="chat-card">
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <strong>Nothing indexed yet</strong>
          Ask a question about your documents below, or tap the mic to ask out loud.
        </div>
      </div>

      <div class="composer">
        <input
          id="textInput"
          type="text"
          placeholder="Ask a question about your documents…"
          autocomplete="off"
        />
        <button id="micBtn" class="icon-btn" title="Record a voice question" aria-label="Record voice question">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button id="sendBtn" class="primary-btn">Send</button>
      </div>
    </main>

    <div class="footer-row">
      <span class="status" id="status"></span>
      <button class="reset-link" id="resetBtn">Clear conversation</button>
    </div>
  </div>

  <audio id="player" hidden></audio>

  <script>
    const messagesEl = document.getElementById('messages');
    const emptyState = document.getElementById('emptyState');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusEl = document.getElementById('status');
    const player = document.getElementById('player');
    const counterValue = document.getElementById('counterValue');

    const micIcon = micBtn.innerHTML;
    const stopIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>';

    let recorder = null;
    let chunks = [];
    let isRecording = false;
    let turnCount = 0;

    function pad(n) { return String(n).padStart(2, '0'); }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function addMessage(role, text) {
      if (emptyState) emptyState.remove();

      if (role === 'user') {
        turnCount += 1;
        counterValue.textContent = pad(turnCount);
      }

      const div = document.createElement('div');
      div.className = `message ${role}`;

      const head = document.createElement('div');
      head.className = 'message-head';

      const turnLabel = document.createElement('span');
      turnLabel.className = 'turn-label';
      turnLabel.textContent = `${role === 'user' ? 'REQUEST' : 'RESPONSE'} ${pad(turnCount)}`;

      const roleLabel = document.createElement('span');
      roleLabel.className = 'role';
      roleLabel.textContent = role === 'user' ? 'You' : 'Engine';

      head.appendChild(turnLabel);
      head.appendChild(roleLabel);

      const body = document.createElement('div');
      body.className = 'message-body';
      body.textContent = text;

      div.appendChild(head);
      div.appendChild(body);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    // Renders retrieval evidence chips under an assistant message, if the
    // backend response includes a `sources` array, e.g.
    // { answer: "...", sources: [{ doc: "policy.pdf", score: 0.92 }] }
    function addSources(messageDiv, sources) {
      if (!sources || !sources.length) return;

      const row = document.createElement('div');
      row.className = 'sources';

      const label = document.createElement('span');
      label.className = 'sources-label';
      label.textContent = 'Retrieved from';
      row.appendChild(label);

      sources.forEach((s, i) => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        const docName = s.doc || s.name || `DOC·${pad(i + 1)}`;
        const score = typeof s.score === 'number' ? ` ${s.score.toFixed(2)}` : '';
        chip.textContent = `${docName}${score}`;
        row.appendChild(chip);
      });

      messageDiv.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setBusy(busy) {
      sendBtn.disabled = busy;
      micBtn.disabled = busy;
      textInput.disabled = busy;
    }

    async function sendText() {
      const text = textInput.value.trim();
      if (!text) return;

      addMessage('user', text);
      textInput.value = '';
      setBusy(true);
      setStatus('Thinking...');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        const msgDiv = addMessage('assistant', data.answer);
        addSources(msgDiv, data.sources);
      } catch (err) {
        addMessage('assistant', 'Something went wrong reaching the assistant.');
        console.error(err);
      } finally {
        setBusy(false);
        setStatus('');
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        recorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        recorder.ondataavailable = (e) => chunks.push(e.data);
        recorder.onstop = async () => {
          stream.getTracks().forEach((t) => t.stop());
          const blob = new Blob(chunks, { type: 'audio/webm' });
          await sendVoice(blob);
        };
        recorder.start();
        isRecording = true;
        micBtn.classList.add('recording');
        micBtn.innerHTML = stopIcon;
        setStatus('Listening... tap again to stop');
      } catch (err) {
        console.error(err);
        setStatus('Microphone access was denied.');
      }
    }

    function stopRecording() {
      if (recorder && isRecording) {
        recorder.stop();
        isRecording = false;
        micBtn.classList.remove('recording');
        micBtn.innerHTML = micIcon;
      }
    }

    async function sendVoice(blob) {
      setBusy(true);
      setStatus('Transcribing...');

      try {
        const formData = new FormData();
        formData.append('audio', blob, 'recording.webm');

        const res = await fetch('/voice-chat', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.transcript) addMessage('user', data.transcript);
        const msgDiv = addMessage('assistant', data.answer);
        addSources(msgDiv, data.sources);

        if (data.audio_url) {
          player.src = `${data.audio_url}?t=${Date.now()}`;
          player.hidden = false;
          await player.play().catch(() => {});
        }
      } catch (err) {
        addMessage('assistant', 'Something went wrong processing the recording.');
        console.error(err);
      } finally {
        setBusy(false);
        setStatus('');
      }
    }

    sendBtn.addEventListener('click', sendText);
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendText();
    });

    micBtn.addEventListener('click', () => {
      if (isRecording) stopRecording();
      else startRecording();
    });

    resetBtn.addEventListener('click', async () => {
      await fetch('/reset', { method: 'POST' });
      messagesEl.innerHTML = '';
      turnCount = 0;
      counterValue.textContent = pad(0);
      const div = document.createElement('div');
      div.className = 'empty-state';
      div.innerHTML = '<strong>Conversation cleared</strong>Ask something new whenever you are ready.';
      messagesEl.appendChild(div);
    });
  </script>
</body>
</html>
